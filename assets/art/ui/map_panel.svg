<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340">
  <rect x="0" y="0" width="420" height="340" rx="10" fill="#0b1018" fill-opacity="0.92" stroke="#2b3647" stroke-width="2"/>
  <rect x="0" y="0" width="420" height="30" rx="10" fill="#141c2b"/>
  <rect x="6" y="22" width="408" height="10" fill="#0b1018"/>
  <!-- corridors (lines behind rooms) -->
  <g stroke="#2b3a4d" stroke-width="6" stroke-linecap="round">
    <line x1="210" y1="74" x2="210" y2="120"/>
    <line x1="105" y1="135" x2="315" y2="135"/>
    <line x1="100" y1="150" x2="100" y2="200"/>
    <line x1="320" y1="150" x2="320" y2="200"/>
    <line x1="140" y1="135" x2="170" y2="270"/>
    <line x1="280" y1="135" x2="250" y2="270"/>
  </g>
  <!-- rooms -->
  <g fill="#1c2a3d" stroke="#3a4a60" stroke-width="2">
    <rect x="180" y="44" width="60" height="34" rx="4"/>
    <rect x="180" y="120" width="60" height="32" rx="4"/>
    <rect x="68" y="120" width="74" height="30" rx="4"/>
    <rect x="278" y="120" width="74" height="30" rx="4"/>
    <rect x="58" y="200" width="84" height="34" rx="4"/>
    <rect x="278" y="200" width="84" height="34" rx="4"/>
  </g>
  <!-- office (you) -->
  <rect x="160" y="270" width="100" height="44" rx="5" fill="#21303f" stroke="#e8a33d" stroke-width="2"/>
  <!-- door thresholds -->
  <rect x="150" y="246" width="20" height="10" rx="2" fill="#b3282d"/>
  <rect x="250" y="246" width="20" height="10" rx="2" fill="#b3282d"/>
</svg>
