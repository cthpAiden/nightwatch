<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340">
  <!-- panel backing -->
  <rect x="0" y="0" width="420" height="340" rx="10" fill="#0b1018" fill-opacity="0.92" stroke="#2b3647" stroke-width="2"/>
  <rect x="0" y="0" width="420" height="30" rx="10" fill="#141c2b"/>
  <rect x="0" y="22" width="420" height="8" fill="#141c2b"/>
  <!-- header lamp dots -->
  <circle cx="16" cy="15" r="4" fill="#3b9c6b"/>
  <circle cx="30" cy="15" r="4" fill="#2b3647"/>

  <!-- ===== corridors (drawn first, under the rooms) ===== -->
  <g stroke="#2b3647" stroke-width="5" stroke-linecap="round">
    <line x1="210" y1="50" x2="120" y2="96"/>
    <line x1="210" y1="50" x2="300" y2="96"/>
    <line x1="210" y1="50" x2="210" y2="152"/>
    <line x1="210" y1="152" x2="72" y2="158"/>
    <line x1="210" y1="152" x2="348" y2="158"/>
    <line x1="120" y1="96" x2="72" y2="158"/>
    <line x1="72" y1="158" x2="96" y2="224"/>
    <line x1="96" y1="224" x2="150" y2="284"/>
    <line x1="150" y1="284" x2="210" y2="308"/>
    <line x1="300" y1="96" x2="348" y2="158"/>
    <line x1="348" y1="158" x2="324" y2="224"/>
    <line x1="324" y1="224" x2="270" y2="284"/>
    <line x1="270" y1="284" x2="210" y2="308"/>
  </g>

  <!-- ===== rooms (rounded plates centred on each MAP_POS) ===== -->
  <g fill="#16202e" stroke="#2f4258" stroke-width="2">
    <rect x="184" y="34" width="52" height="32" rx="6"/>    <!-- gate -->
    <rect x="184" y="136" width="52" height="32" rx="6"/>   <!-- courtyard -->
    <!-- left wing -->
    <rect x="94" y="80" width="52" height="32" rx="6"/>     <!-- canteen -->
    <rect x="46" y="142" width="52" height="32" rx="6"/>    <!-- classroom -->
    <rect x="70" y="208" width="52" height="32" rx="6"/>    <!-- library -->
    <rect x="124" y="268" width="52" height="32" rx="6"/>   <!-- left_hall -->
    <!-- right wing -->
    <rect x="274" y="80" width="52" height="32" rx="6"/>    <!-- gym -->
    <rect x="322" y="142" width="52" height="32" rx="6"/>   <!-- restroom -->
    <rect x="298" y="208" width="52" height="32" rx="6"/>   <!-- infirmary -->
    <rect x="244" y="268" width="52" height="32" rx="6"/>   <!-- right_hall -->
  </g>

  <!-- door squares either side of the office -->
  <rect x="176" y="296" width="14" height="14" rx="2" fill="#243246" stroke="#3a4a60" stroke-width="1.5"/>
  <rect x="230" y="296" width="14" height="14" rx="2" fill="#243246" stroke="#3a4a60" stroke-width="1.5"/>

  <!-- ===== the office (you are here) ===== -->
  <rect x="182" y="298" width="56" height="30" rx="6" fill="#3a2f1a" stroke="#9a7a2c" stroke-width="2"/>
  <circle cx="210" cy="313" r="6" fill="#f2c14e"/>
  <circle cx="210" cy="313" r="11" fill="none" stroke="#f2c14e" stroke-width="1.5" stroke-opacity="0.5"/>
</svg>
