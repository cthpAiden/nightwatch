<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- ===== NIGHT SKY / DARKNESS ===== -->
  <rect x="0" y="0" width="1280" height="720" fill="#0a0e14"/>
  <rect x="0" y="0" width="1280" height="470" fill="#121a2b"/>

  <!-- faint cold moon glow upper-right -->
  <radialGradient id="skyGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#cdd6d0" stop-opacity="0.16"/>
    <stop offset="60%" stop-color="#cdd6d0" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#cdd6d0" stop-opacity="0"/>
  </radialGradient>
  <circle cx="1060" cy="130" r="230" fill="url(#skyGlow)"/>
  <circle cx="1080" cy="115" r="26" fill="#e8ead0" fill-opacity="0.4"/>

  <!-- ===== BACK WALL of courtyard ===== -->
  <rect x="0" y="300" width="1280" height="180" fill="#2b3a36"/>
  <rect x="0" y="300" width="1280" height="180" fill="#0a0e14" fill-opacity="0.5"/>
  <!-- wall top cap -->
  <rect x="0" y="300" width="1280" height="12" fill="#36473f" fill-opacity="0.5"/>
  <!-- a few wall bricks/seams -->
  <g stroke="#0a0e14" stroke-opacity="0.4" stroke-width="2">
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="420" x2="1280" y2="420"/>
    <line x1="160" y1="312" x2="160" y2="360"/>
    <line x1="400" y1="360" x2="400" y2="420"/>
    <line x1="640" y1="312" x2="640" y2="360"/>
    <line x1="880" y1="360" x2="880" y2="420"/>
    <line x1="1120" y1="312" x2="1120" y2="360"/>
  </g>

  <!-- ===== GROUND ===== -->
  <rect x="0" y="470" width="1280" height="250" fill="#1e2a3d"/>
  <rect x="0" y="470" width="1280" height="250" fill="#0a0e14" fill-opacity="0.4"/>
  <line x1="0" y1="470" x2="1280" y2="470" stroke="#0a0e14" stroke-width="3" stroke-opacity="0.5"/>
  <!-- ground tile seams -->
  <g stroke="#0a0e14" stroke-opacity="0.3" stroke-width="2">
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="0" y1="640" x2="1280" y2="640"/>
    <line x1="320" y1="470" x2="260" y2="720"/>
    <line x1="960" y1="470" x2="1020" y2="720"/>
  </g>

  <!-- ===== BIG OLD BANYAN TREE (cay da) SILHOUETTE, left ===== -->
  <!-- trunk + buttress roots -->
  <path d="M150 470
           C150 470 132 380 128 300
           C124 230 150 170 150 120
           C152 80 176 60 176 40
           L176 0 L300 0 L300 40
           C300 60 320 90 320 140
           C322 200 300 250 304 310
           C306 380 300 470 300 470
           L270 470 C272 420 264 390 250 470
           L222 470 C228 410 220 380 214 470
           L180 470 C190 410 176 400 170 470 Z"
        fill="#0a0e14"/>
  <!-- hanging aerial roots (banyan signature) -->
  <g stroke="#0a0e14" stroke-width="5" fill="none">
    <path d="M200 120 C198 200 204 280 200 360"/>
    <path d="M240 110 C244 190 238 270 244 350"/>
    <path d="M278 130 C282 210 276 290 280 360"/>
    <path d="M160 150 C158 220 164 280 160 340"/>
  </g>
  <g stroke="#0a0e14" stroke-width="3" fill="none">
    <path d="M222 116 C220 180 226 240 222 300"/>
    <path d="M260 120 C264 180 258 240 262 300"/>
    <path d="M185 130 C183 190 189 240 185 290"/>
  </g>

  <!-- broad canopy of the banyan (overhead-left, big lumpy mass) -->
  <g fill="#0a0e14">
    <ellipse cx="230" cy="70" rx="240" ry="120"/>
    <ellipse cx="80" cy="110" rx="130" ry="90"/>
    <ellipse cx="400" cy="100" rx="150" ry="100"/>
    <ellipse cx="300" cy="40" rx="160" ry="90"/>
    <ellipse cx="120" cy="40" rx="120" ry="70"/>
  </g>
  <!-- canopy bottom lumps -->
  <path d="M0 0 L0 200 C40 220 90 190 130 210 C180 235 220 195 270 215 C330 240 380 200 440 210 C480 216 510 180 510 150 L510 0 Z" fill="#0a0e14"/>
  <!-- a few faint moonlit leaf edges on canopy -->
  <g fill="#1e2a3d" fill-opacity="0.5">
    <ellipse cx="420" cy="120" rx="40" ry="18"/>
    <ellipse cx="360" cy="160" rx="30" ry="14"/>
    <ellipse cx="470" cy="80" rx="26" ry="12"/>
  </g>

  <!-- ===== SMALL SHRINE / ALTAR NOOK (right) with faint red glow ===== -->
  <!-- recessed nook in wall -->
  <rect x="1010" y="318" width="180" height="162" fill="#0a0e14"/>
  <rect x="1018" y="326" width="164" height="146" fill="#121a2b"/>
  <rect x="1018" y="326" width="164" height="146" fill="#0a0e14" fill-opacity="0.3"/>

  <!-- red glow inside the nook -->
  <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#b3282d" stop-opacity="0.85"/>
    <stop offset="45%" stop-color="#b3282d" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#b3282d" stop-opacity="0"/>
  </radialGradient>
  <circle cx="1100" cy="430" r="120" fill="url(#redGlow)"/>

  <!-- little altar table/box -->
  <rect x="1050" y="430" width="100" height="50" fill="#1e2a3d"/>
  <rect x="1050" y="430" width="100" height="8" fill="#36473f" fill-opacity="0.5"/>
  <!-- altar roof (tiny temple) -->
  <polygon points="1040,400 1160,400 1132,372 1068,372" fill="#1e2a3d"/>
  <polygon points="1040,400 1160,400 1150,408 1050,408" fill="#0a0e14"/>
  <!-- upturned eaves -->
  <path d="M1040 400 Q1028 396 1024 386" stroke="#1e2a3d" stroke-width="5" fill="none"/>
  <path d="M1160 400 Q1172 396 1176 386" stroke="#1e2a3d" stroke-width="5" fill="none"/>

  <!-- two incense / candle embers (red points) -->
  <circle cx="1080" cy="424" r="4" fill="#b3282d"/>
  <circle cx="1080" cy="424" r="2" fill="#f0b65a" fill-opacity="0.8"/>
  <circle cx="1120" cy="424" r="4" fill="#b3282d"/>
  <circle cx="1120" cy="424" r="2" fill="#f0b65a" fill-opacity="0.8"/>
  <!-- thin incense smoke wisps -->
  <g stroke="#cdd6d0" stroke-opacity="0.12" stroke-width="2" fill="none">
    <path d="M1080 420 C1076 405 1086 396 1082 382"/>
    <path d="M1120 420 C1124 405 1114 396 1118 382"/>
  </g>
  <!-- faint red spill onto ground in front of nook -->
  <ellipse cx="1100" cy="500" rx="130" ry="40" fill="#b3282d" fill-opacity="0.10"/>

  <!-- ===== SCATTERED LEAVES on the ground ===== -->
  <g fill="#0a0e14">
    <ellipse cx="380" cy="560" rx="12" ry="6" transform="rotate(25 380 560)"/>
    <ellipse cx="460" cy="600" rx="11" ry="5" transform="rotate(-15 460 600)"/>
    <ellipse cx="560" cy="640" rx="13" ry="6" transform="rotate(40 560 640)"/>
    <ellipse cx="300" cy="640" rx="11" ry="5" transform="rotate(-30 300 640)"/>
    <ellipse cx="700" cy="600" rx="12" ry="6" transform="rotate(10 700 600)"/>
    <ellipse cx="640" cy="540" rx="10" ry="5" transform="rotate(-45 640 540)"/>
    <ellipse cx="820" cy="650" rx="12" ry="6" transform="rotate(55 820 650)"/>
    <ellipse cx="240" cy="580" rx="10" ry="5" transform="rotate(35 240 580)"/>
    <ellipse cx="900" cy="600" rx="11" ry="5" transform="rotate(-20 900 600)"/>
    <ellipse cx="500" cy="540" rx="9" ry="4" transform="rotate(15 500 540)"/>
  </g>
  <!-- a couple leaves catching the slightest light -->
  <g fill="#2b3a36" fill-opacity="0.6">
    <ellipse cx="460" cy="600" rx="6" ry="3" transform="rotate(-15 460 600)"/>
    <ellipse cx="700" cy="600" rx="6" ry="3" transform="rotate(10 700 600)"/>
  </g>

  <!-- ===== ATMOSPHERE: vignette + grain + scanlines ===== -->
  <radialGradient id="vig2" cx="50%" cy="46%" r="62%">
    <stop offset="55%" stop-color="#0a0e14" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0e14" stop-opacity="0.82"/>
  </radialGradient>
  <rect x="0" y="0" width="1280" height="720" fill="url(#vig2)"/>

  <!-- grain specks -->
  <g fill="#cdd6d0" fill-opacity="0.05">
    <rect x="540" y="120" width="2" height="2"/>
    <rect x="720" y="80" width="2" height="2"/>
    <rect x="860" y="160" width="2" height="2"/>
    <rect x="980" y="100" width="2" height="2"/>
    <rect x="620" y="240" width="2" height="2"/>
    <rect x="320" y="520" width="2" height="2"/>
    <rect x="760" y="660" width="2" height="2"/>
    <rect x="1180" y="600" width="2" height="2"/>
    <rect x="160" y="500" width="2" height="2"/>
    <rect x="600" y="430" width="2" height="2"/>
    <rect x="900" y="470" width="2" height="2"/>
    <rect x="440" y="330" width="2" height="2"/>
    <rect x="1080" y="260" width="2" height="2"/>
    <rect x="700" y="560" width="2" height="2"/>
    <rect x="260" y="690" width="2" height="2"/>
  </g>

  <!-- CCTV scanlines -->
  <g stroke="#0a0e14" stroke-opacity="0.10" stroke-width="1">
    <line x1="0" y1="60" x2="1280" y2="60"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="0" y1="420" x2="1280" y2="420"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="0" y1="660" x2="1280" y2="660"/>
  </g>
</svg>
