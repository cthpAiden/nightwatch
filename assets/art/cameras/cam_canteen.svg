<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- ===== ABANDONED VIETNAMESE SCHOOL CANTEEN (cang tin): moonlit ===== -->

  <!-- base darkness -->
  <rect x="0" y="0" width="1280" height="720" fill="#0a0e14"/>

  <!-- back wall (muted teal/blue) -->
  <rect x="0" y="0" width="1280" height="500" fill="#2b3647"/>
  <rect x="0" y="0" width="1280" height="500" fill="#243246" fill-opacity="0.5"/>
  <!-- wall lower shadow band -->
  <rect x="0" y="380" width="1280" height="120" fill="#1c2735" fill-opacity="0.7"/>
  <!-- floor (cold tiles) -->
  <rect x="0" y="486" width="1280" height="234" fill="#121a2b"/>
  <rect x="0" y="480" width="1280" height="10" fill="#1e2a3d"/>
  <line x1="0" y1="540" x2="1280" y2="540" stroke="#0a0e14" stroke-width="2"/>
  <line x1="0" y1="600" x2="1280" y2="600" stroke="#0a0e14" stroke-width="2"/>
  <line x1="0" y1="660" x2="1280" y2="660" stroke="#0a0e14" stroke-width="2"/>
  <!-- ceiling shadow -->
  <rect x="0" y="0" width="1280" height="60" fill="#0a0e14" fill-opacity="0.6"/>

  <!-- ===== SERVING COUNTER (right wall) with roll-up shutter ===== -->
  <rect x="900" y="120" width="380" height="210" fill="#243246"/>
  <!-- roll-up shutter (partly down, slats) -->
  <rect x="912" y="120" width="356" height="120" fill="#16202e"/>
  <line x1="912" y1="138" x2="1268" y2="138" stroke="#0a0e14" stroke-width="3"/>
  <line x1="912" y1="158" x2="1268" y2="158" stroke="#0a0e14" stroke-width="3"/>
  <line x1="912" y1="178" x2="1268" y2="178" stroke="#0a0e14" stroke-width="3"/>
  <line x1="912" y1="198" x2="1268" y2="198" stroke="#0a0e14" stroke-width="3"/>
  <line x1="912" y1="218" x2="1268" y2="218" stroke="#0a0e14" stroke-width="3"/>
  <rect x="912" y="236" width="356" height="6" fill="#2f4258"/>
  <!-- counter top + body -->
  <rect x="900" y="330" width="380" height="22" fill="#2a3a52"/>
  <rect x="900" y="352" width="380" height="150" fill="#1e2a3d"/>
  <rect x="980" y="360" width="120" height="60" fill="#16202e"/>
  <!-- tea urn on counter -->
  <ellipse cx="1180" cy="334" rx="34" ry="10" fill="#0a0e14" fill-opacity="0.5"/>
  <rect x="1152" y="276" width="56" height="60" rx="6" fill="#2a3a52"/>
  <rect x="1158" y="270" width="44" height="12" rx="4" fill="#16202e"/>
  <rect x="1147" y="312" width="8" height="14" fill="#16202e"/>
  <circle cx="1180" cy="265" r="5" fill="#cdd6d0" fill-opacity="0.6"/>

  <!-- faded hanging menu board (back wall) -->
  <rect x="150" y="96" width="300" height="150" fill="#16201c"/>
  <rect x="150" y="96" width="300" height="14" fill="#3a2f25"/>
  <line x1="190" y1="140" x2="380" y2="140" stroke="#dfe6e1" stroke-width="3" stroke-opacity="0.16"/>
  <line x1="190" y1="172" x2="320" y2="172" stroke="#dfe6e1" stroke-width="3" stroke-opacity="0.12"/>
  <line x1="190" y1="204" x2="360" y2="204" stroke="#dfe6e1" stroke-width="3" stroke-opacity="0.1"/>
  <line x1="220" y1="60" x2="230" y2="96" stroke="#0a0e14" stroke-width="2"/>
  <line x1="380" y1="60" x2="370" y2="96" stroke="#0a0e14" stroke-width="2"/>

  <!-- wall clock -->
  <circle cx="640" cy="150" r="36" fill="#16202e" stroke="#2f4258" stroke-width="4"/>
  <circle cx="640" cy="150" r="3" fill="#cdd6d0" fill-opacity="0.7"/>
  <line x1="640" y1="150" x2="640" y2="126" stroke="#cdd6d0" stroke-width="3" stroke-opacity="0.6"/>
  <line x1="640" y1="150" x2="658" y2="158" stroke="#cdd6d0" stroke-width="3" stroke-opacity="0.5"/>

  <!-- ===== BARRED WINDOW (left wall) with moonlight pool ===== -->
  <rect x="40" y="80" width="170" height="250" fill="#1e2a3d"/>
  <rect x="52" y="92" width="146" height="226" fill="#0a0e14"/>
  <radialGradient id="canMoonSky" cx="45%" cy="35%" r="75%">
    <stop offset="0%" stop-color="#e8ead0" stop-opacity="0.85"/>
    <stop offset="30%" stop-color="#5b6f7e" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#0a0e14" stop-opacity="0"/>
  </radialGradient>
  <rect x="52" y="92" width="146" height="226" fill="url(#canMoonSky)"/>
  <circle cx="120" cy="155" r="24" fill="#e8ead0"/>
  <circle cx="112" cy="149" r="24" fill="#0a0e14" fill-opacity="0.18"/>
  <rect x="92" y="92" width="6" height="226" fill="#0a0e14"/>
  <rect x="138" y="92" width="6" height="226" fill="#0a0e14"/>
  <rect x="184" y="92" width="6" height="226" fill="#0a0e14"/>
  <rect x="52" y="202" width="146" height="6" fill="#0a0e14"/>
  <!-- moonlight pool on floor -->
  <radialGradient id="canMoonPool" cx="35%" cy="0%" r="100%">
    <stop offset="0%" stop-color="#cdd6d0" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#cdd6d0" stop-opacity="0"/>
  </radialGradient>
  <polygon points="52,330 200,330 320,720 0,720" fill="url(#canMoonPool)"/>
  <polygon points="92,330 98,330 150,720 130,720" fill="#0a0e14" fill-opacity="0.42"/>
  <polygon points="138,330 144,330 230,720 210,720" fill="#0a0e14" fill-opacity="0.42"/>

  <!-- ===== LONG DINING TABLES with bench seats (rows receding) ===== -->
  <!-- BACK ROW (smaller, dimmer) -->
  <g fill-opacity="0.92">
    <rect x="470" y="430" width="300" height="16" fill="#1e2a3d"/>
    <rect x="470" y="430" width="300" height="5" fill="#2a3a52"/>
    <rect x="486" y="446" width="10" height="40" fill="#16202e"/>
    <rect x="744" y="446" width="10" height="40" fill="#16202e"/>
    <rect x="470" y="458" width="300" height="8" fill="#243246"/>
  </g>

  <!-- MIDDLE ROW -->
  <g>
    <rect x="350" y="510" width="560" height="22" fill="#243246"/>
    <rect x="350" y="510" width="560" height="6" fill="#2f4258"/>
    <rect x="370" y="532" width="14" height="70" fill="#121a2b"/>
    <rect x="876" y="532" width="14" height="70" fill="#121a2b"/>
    <!-- bench front -->
    <rect x="350" y="548" width="560" height="12" fill="#2a3a52"/>
    <rect x="360" y="560" width="12" height="40" fill="#16202e"/>
    <rect x="888" y="560" width="12" height="40" fill="#16202e"/>
    <ellipse cx="630" cy="608" rx="300" ry="16" fill="#0a0e14" fill-opacity="0.5"/>
  </g>

  <!-- FRONT ROW (larger, closer) -->
  <g>
    <rect x="240" y="600" width="800" height="30" fill="#2a3a52"/>
    <rect x="240" y="600" width="800" height="9" fill="#374d68"/>
    <rect x="266" y="630" width="18" height="90" fill="#16202e"/>
    <rect x="996" y="630" width="18" height="90" fill="#16202e"/>
    <!-- bench front -->
    <rect x="240" y="652" width="800" height="16" fill="#243246"/>
    <ellipse cx="640" cy="712" rx="430" ry="18" fill="#0a0e14" fill-opacity="0.5"/>
  </g>

  <!-- ===== overturned plastic stools ===== -->
  <ellipse cx="300" cy="556" rx="40" ry="10" fill="#0a0e14" fill-opacity="0.5"/>
  <ellipse cx="300" cy="540" rx="34" ry="12" fill="#2a3a52"/>
  <ellipse cx="300" cy="538" rx="22" ry="8" fill="#16202e"/>
  <rect x="296" y="540" width="8" height="22" fill="#1e2a3d"/>

  <ellipse cx="980" cy="556" rx="40" ry="10" fill="#0a0e14" fill-opacity="0.5"/>
  <rect x="950" y="520" width="60" height="14" rx="4" fill="#243246"/>
  <rect x="956" y="534" width="8" height="20" fill="#16202e"/>
  <rect x="996" y="534" width="8" height="20" fill="#16202e"/>

  <!-- ===== heavy vignette (oppressive corners) ===== -->
  <radialGradient id="canVig" cx="50%" cy="50%" r="62%">
    <stop offset="52%" stop-color="#0a0e14" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0e14" stop-opacity="0.92"/>
  </radialGradient>
  <rect x="0" y="0" width="1280" height="720" fill="url(#canVig)"/>
  <rect x="0" y="0" width="1280" height="56" fill="#0a0e14" fill-opacity="0.55"/>
  <rect x="0" y="666" width="1280" height="54" fill="#0a0e14" fill-opacity="0.5"/>
</svg>
