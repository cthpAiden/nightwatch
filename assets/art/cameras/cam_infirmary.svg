<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- ===== ABANDONED VIETNAMESE SCHOOL INFIRMARY (phong y te): moonlit ===== -->

  <!-- base darkness -->
  <rect x="0" y="0" width="1280" height="720" fill="#0a0e14"/>

  <!-- back wall (muted blue) -->
  <rect x="0" y="0" width="1280" height="500" fill="#2b3647"/>
  <!-- tiled lower wall (sickroom dado) -->
  <rect x="0" y="300" width="1280" height="200" fill="#243246"/>
  <line x1="0" y1="300" x2="1280" y2="300" stroke="#16202e" stroke-width="3"/>
  <line x1="0" y1="380" x2="1280" y2="380" stroke="#16202e" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- floor -->
  <rect x="0" y="486" width="1280" height="234" fill="#121a2b"/>
  <rect x="0" y="480" width="1280" height="10" fill="#1e2a3d"/>
  <line x1="0" y1="545" x2="1280" y2="545" stroke="#0a0e14" stroke-width="2"/>
  <line x1="0" y1="610" x2="1280" y2="610" stroke="#0a0e14" stroke-width="2"/>
  <line x1="0" y1="675" x2="1280" y2="675" stroke="#0a0e14" stroke-width="2"/>
  <!-- ceiling shadow -->
  <rect x="0" y="0" width="1280" height="60" fill="#0a0e14" fill-opacity="0.6"/>

  <!-- ===== BARRED WINDOW (back wall) with moonlight ===== -->
  <rect x="900" y="70" width="200" height="240" fill="#1e2a3d"/>
  <rect x="912" y="82" width="176" height="216" fill="#0a0e14"/>
  <radialGradient id="infMoonSky" cx="55%" cy="35%" r="75%">
    <stop offset="0%" stop-color="#e8ead0" stop-opacity="0.85"/>
    <stop offset="32%" stop-color="#5b6f7e" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#0a0e14" stop-opacity="0"/>
  </radialGradient>
  <rect x="912" y="82" width="176" height="216" fill="url(#infMoonSky)"/>
  <circle cx="1010" cy="150" r="24" fill="#e8ead0"/>
  <circle cx="1002" cy="144" r="24" fill="#0a0e14" fill-opacity="0.18"/>
  <rect x="952" y="82" width="6" height="216" fill="#0a0e14"/>
  <rect x="998" y="82" width="6" height="216" fill="#0a0e14"/>
  <rect x="1044" y="82" width="6" height="216" fill="#0a0e14"/>
  <rect x="912" y="186" width="176" height="6" fill="#0a0e14"/>

  <!-- moonlight pool on floor with barred shadow stripes -->
  <radialGradient id="infMoonPool" cx="50%" cy="0%" r="100%">
    <stop offset="0%" stop-color="#cdd6d0" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#cdd6d0" stop-opacity="0"/>
  </radialGradient>
  <polygon points="912,310 1088,310 1180,720 760,720" fill="url(#infMoonPool)"/>
  <polygon points="952,310 958,310 1010,720 988,720" fill="#0a0e14" fill-opacity="0.45"/>
  <polygon points="998,310 1004,310 1078,720 1056,720" fill="#0a0e14" fill-opacity="0.42"/>

  <!-- ===== FADED RED-CROSS SIGN (back-left wall) ===== -->
  <rect x="150" y="100" width="160" height="160" fill="#16202e"/>
  <rect x="158" y="108" width="144" height="144" fill="#1a2535"/>
  <rect x="212" y="130" width="36" height="100" fill="#5a2b2b"/>
  <rect x="180" y="162" width="100" height="36" fill="#5a2b2b"/>

  <!-- ===== GLASS-FRONT MEDICINE CABINET (back wall, left) ===== -->
  <rect x="380" y="120" width="150" height="220" fill="#16202e"/>
  <rect x="390" y="132" width="130" height="196" fill="#243246"/>
  <rect x="392" y="134" width="62" height="192" fill="#2a3a52" fill-opacity="0.5"/>
  <line x1="455" y1="132" x2="455" y2="328" stroke="#0a0e14" stroke-width="3"/>
  <line x1="390" y1="180" x2="520" y2="180" stroke="#16202e" stroke-width="3"/>
  <line x1="390" y1="232" x2="520" y2="232" stroke="#16202e" stroke-width="3"/>
  <line x1="390" y1="284" x2="520" y2="284" stroke="#16202e" stroke-width="3"/>
  <rect x="404" y="150" width="10" height="22" fill="#cdd6d0" fill-opacity="0.35"/>
  <rect x="424" y="202" width="10" height="22" fill="#cdd6d0" fill-opacity="0.28"/>

  <!-- ===== PRIVACY CURTAIN on rail (half-drawn, right) ===== -->
  <rect x="600" y="60" width="560" height="8" fill="#16202e"/>
  <g fill="#2b3a36">
    <path d="M620 68 q14 18 0 36 q-14 18 0 36 q14 18 0 36 q-14 18 0 36 q14 18 0 36 q-14 18 0 36 q14 18 0 36 q-14 18 0 36 L620 360 Z"/>
    <rect x="612" y="68" width="120" height="300"/>
  </g>
  <path d="M620 68 q14 18 0 36 q-14 18 0 36 q14 18 0 36 q-14 18 0 36 q14 18 0 36 q-14 18 0 36 q14 18 0 36 q-14 18 0 36" fill="none" stroke="#1c2824" stroke-width="6"/>
  <rect x="612" y="68" width="14" height="300" fill="#cdd6d0" fill-opacity="0.08"/>

  <!-- ===== COT 1 (front-left, disturbed/empty sheet) ===== -->
  <rect x="120" y="470" width="320" height="20" fill="#243246"/>
  <rect x="120" y="466" width="320" height="8" fill="#2f4258"/>
  <rect x="132" y="490" width="14" height="150" fill="#16202e"/>
  <rect x="414" y="490" width="14" height="150" fill="#16202e"/>
  <rect x="118" y="430" width="16" height="44" fill="#1a2535"/>
  <!-- thin mattress + rumpled, thrown-back sheet (empty) -->
  <rect x="128" y="452" width="304" height="20" fill="#1e2a3d"/>
  <path d="M128 458 q40 -22 90 4 q50 24 120 -6 q40 -16 94 8 l0 16 l-304 0 Z" fill="#cdd6d0" fill-opacity="0.5"/>
  <path d="M150 460 q30 -10 60 2 q40 14 70 -2" fill="none" stroke="#0a0e14" stroke-width="2" stroke-opacity="0.4"/>
  <ellipse cx="280" cy="652" rx="180" ry="20" fill="#0a0e14" fill-opacity="0.6"/>

  <!-- ===== COT 2 (mid-right, made bed with sheet) ===== -->
  <rect x="700" y="430" width="280" height="18" fill="#243246"/>
  <rect x="700" y="426" width="280" height="7" fill="#2f4258"/>
  <rect x="712" y="448" width="12" height="120" fill="#16202e"/>
  <rect x="966" y="448" width="12" height="120" fill="#16202e"/>
  <rect x="698" y="394" width="14" height="38" fill="#1a2535"/>
  <rect x="708" y="414" width="264" height="16" fill="#1e2a3d"/>
  <rect x="708" y="416" width="264" height="12" fill="#cdd6d0" fill-opacity="0.32"/>
  <rect x="720" y="408" width="60" height="16" fill="#cdd6d0" fill-opacity="0.45"/>
  <ellipse cx="840" cy="584" rx="160" ry="16" fill="#0a0e14" fill-opacity="0.55"/>

  <!-- ===== SMALL DESK with folder (front-right) ===== -->
  <rect x="1010" y="500" width="200" height="22" fill="#2a3a52"/>
  <rect x="1010" y="500" width="200" height="8" fill="#374d68"/>
  <rect x="1022" y="522" width="14" height="120" fill="#16202e"/>
  <rect x="1184" y="522" width="14" height="120" fill="#16202e"/>
  <rect x="1040" y="488" width="70" height="14" fill="#2b3a36"/>
  <rect x="1044" y="484" width="62" height="8" fill="#36473f"/>
  <ellipse cx="1110" cy="650" rx="120" ry="16" fill="#0a0e14" fill-opacity="0.55"/>

  <!-- ===== STANDING WEIGHT SCALE (front-left, near cot) ===== -->
  <rect x="510" y="600" width="70" height="20" fill="#16202e"/>
  <rect x="538" y="500" width="12" height="102" fill="#1e2a3d"/>
  <rect x="520" y="486" width="60" height="22" fill="#243246"/>
  <rect x="520" y="486" width="60" height="6" fill="#2a3a52"/>
  <circle cx="550" cy="497" r="6" fill="#cdd6d0" fill-opacity="0.3"/>
  <ellipse cx="545" cy="626" rx="60" ry="10" fill="#0a0e14" fill-opacity="0.5"/>

  <!-- ===== heavy vignette (oppressive corners) ===== -->
  <radialGradient id="infVig" cx="50%" cy="50%" r="62%">
    <stop offset="52%" stop-color="#0a0e14" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0e14" stop-opacity="0.92"/>
  </radialGradient>
  <rect x="0" y="0" width="1280" height="720" fill="url(#infVig)"/>
  <rect x="0" y="0" width="1280" height="56" fill="#0a0e14" fill-opacity="0.55"/>
  <rect x="0" y="666" width="1280" height="54" fill="#0a0e14" fill-opacity="0.5"/>
</svg>
