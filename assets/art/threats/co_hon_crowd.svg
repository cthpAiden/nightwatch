  <ellipse cx="200" cy="290" rx="9" ry="11" fill="url(#eyePale)"/>
  <circle cx="180" cy="291" r="3" fill="#0a0e14"/>
  <circle cx="200" cy="291" r="3" fill="#0a0e14"/>
  <ellipse cx="190" cy="318" rx="5" ry="7" fill="#0a0e14"/>

