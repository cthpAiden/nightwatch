  <path d="M172 452 C170 442 172 438 176 440 M180 448 C180 438 182 436 186 438 M190 448 C192 440 196 440 198 444 M200 452 C204 446 208 448 208 452" stroke="#222e29" stroke-width="4" stroke-linecap="round" fill="none"/>

  <path d="M298 452 C316 446 334 448 344 456 C340 470 324 476 306 472 Z" fill="#1a232d"/>
  <path d="M340 452 C342 442 340 438 336 440 M332 448 C332 438 330 436 326 438 M322 448 C320 440 316 440 314 444 M312 452 C308 446 304 448 304 452" stroke="#222e29" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- front face: gaunt, sunken cheeks -->
  <path d="M226 330 C232 348 240 356 248 360 C238 360 228 348 226 336 Z" fill="#0a0e14" fill-opacity="0.4"/>
  <path d="M286 330 C280 348 272 356 264 360 C274 360 284 348 286 336 Z" fill="#0a0e14" fill-opacity="0.4"/>

  <!-- front big hollow sad eyes -->
  <ellipse cx="240" cy="318" rx="13" ry="15" fill="#0a0e14"/>
  <ellipse cx="272" cy="318" rx="13" ry="15" fill="#0a0e14"/>
  <ellipse cx="240" cy="318" rx="11" ry="13" fill="url(#eyePale)"/>
  <ellipse cx="272" cy="318" rx="11" ry="13" fill="url(#eyePale)"/>
  <circle cx="240" cy="320" r="4" fill="#0a0e14"/>
  <circle cx="272" cy="320" r="4" fill="#0a0e14"/>
  <!-- drooping mournful brows -->
  <path d="M227 302 C233 296 245 296 252 302" stroke="#2b3a36" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M260 302 C267 296 279 296 285 302" stroke="#2b3a36" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- nose hollow + small open hungry mouth -->
  <path d="M254 328 C250 338 250 344 256 348 C262 344 262 338 258 328 Z" fill="#0a0e14" fill-opacity="0.4"/>
  <ellipse cx="256" cy="358" rx="8" ry="11" fill="#0a0e14"/>
  <ellipse cx="256" cy="356" rx="5" ry="6" fill="#11161f"/>

  <!-- breath fog smudges on the cold glass -->
  <ellipse cx="256" cy="372" rx="26" ry="12" fill="#cdd6d0" fill-opacity="0.06"/>
  <ellipse cx="190" cy="332" rx="20" ry="9" fill="#cdd6d0" fill-opacity="0.05"/>
  <ellipse cx="322" cy="332" rx="20" ry="9" fill="#cdd6d0" fill-opacity="0.05"/>

  <!-- window frame + cross mullions over everything (CCTV-creepy) -->
  <rect x="40" y="40" width="432" height="688" rx="6" fill="none" stroke="#2b3a36" stroke-width="14"/>
  <rect x="40" y="40" width="432" height="688" rx="6" fill="none" stroke="#0a0e14" stroke-width="4"/>
  <rect x="248" y="40" width="16" height="688" fill="#2b3a36"/>
  <rect x="252" y="40" width="4" height="688" fill="#0a0e14" fill-opacity="0.6"/>
  <rect x="40" y="372" width="432" height="16" fill="#2b3a36"/>
  <rect x="40" y="376" width="432" height="4" fill="#0a0e14" fill-opacity="0.6"/>
  <!-- faint reflection streak on glass -->
  <path d="M88 60 L150 60 L96 700 L66 700 Z" fill="#6f9bb3" fill-opacity="0.05"/>
