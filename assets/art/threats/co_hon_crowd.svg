  <circle cx="210" cy="302" r="4" fill="#cdd6d0" fill-opacity="0.5"/>
  <circle cx="306" cy="296" r="4" fill="#cdd6d0" fill-opacity="0.5"/>
  <circle cx="320" cy="298" r="4" fill="#cdd6d0" fill-opacity="0.5"/>

