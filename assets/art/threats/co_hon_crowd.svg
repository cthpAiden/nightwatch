<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768">
  <defs>
    <radialGradient id="crowdGlow" cx="50%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#6f9bb3" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#6f9bb3" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#6f9bb3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crowdPane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a3d"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <radialGradient id="eyePale" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8ead0" stop-opacity="0.95"/>
      <stop offset="38%" stop-color="#cdd6d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#cdd6d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeCold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cdd6d0" stop-opacity="0.85"/>
      <stop offset="42%" stop-color="#6f9bb3" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6f9bb3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="figFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161e1c"/>
      <stop offset="100%" stop-color="#080b10"/>
    </linearGradient>
  </defs>

  <!-- window pane behind the glass -->
  <rect x="40" y="40" width="432" height="688" rx="6" fill="url(#crowdPane)"/>
  <ellipse cx="256" cy="360" rx="220" ry="300" fill="url(#crowdGlow)"/>

  <!-- ===== back row: distant gaunt shapes, just hints + eyes ===== -->
  <path d="M86 360 C82 300 100 250 126 250 C150 250 166 296 162 360 C160 470 162 600 158 700 L96 700 C92 600 90 470 86 360 Z" fill="#0c1118"/>
  <path d="M118 248 C112 214 124 192 142 192 C160 192 170 214 164 248 C160 280 150 296 142 296 C132 296 122 280 118 248 Z" fill="#0c1118"/>

  <path d="M352 360 C348 300 364 248 388 248 C412 248 428 298 424 360 C422 470 424 600 420 700 L362 700 C358 600 356 470 352 360 Z" fill="#0c1118"/>
  <path d="M380 246 C374 212 388 190 404 190 C422 190 432 212 426 246 C422 278 414 294 404 294 C394 294 386 278 380 246 Z" fill="#0c1118"/>

  <path d="M216 340 C212 286 228 244 250 244 C272 244 286 286 282 340 C280 460 282 600 280 700 L218 700 C216 600 218 460 216 340 Z" fill="#0a0e14"/>
  <path d="M240 244 C234 210 246 188 256 188 C268 188 280 210 274 244 C270 276 264 292 256 292 C246 292 244 276 240 244 Z" fill="#0a0e14"/>

