  <ellipse cx="322" cy="470" rx="44" ry="46" fill="#0a0e14" fill-opacity="0.45"/>
  <path d="M310 300 C316 306 328 306 334 300" stroke="#0a0e14" stroke-width="2" stroke-opacity="0.4" fill="none"/>
  <!-- right mid eyes -->
  <ellipse cx="312" cy="290" rx="9" ry="11" fill="url(#eyeCold)"/>
  <ellipse cx="332" cy="290" rx="9" ry="11" fill="url(#eyeCold)"/>
  <circle cx="312" cy="291" r="3" fill="#0a0e14"/>
  <circle cx="332" cy="291" r="3" fill="#0a0e14"/>
  <ellipse cx="322" cy="318" rx="5" ry="7" fill="#0a0e14"/>

  <!-- ===== front figure: closest, palms + face pressed to the glass ===== -->
  <path d="M212 470 C206 410 222 368 248 368 C232 368 224 340 228 318 C232 292 244 278 256 278 C268 278 280 292 284 318 C288 340 280 368 264 368 C290 368 306 410 300 470 C308 540 308 620 304 712 L208 712 C204 620 204 540 212 470 Z" fill="url(#figFront)"/>
  <!-- hollow belly on front figure -->
  <ellipse cx="256" cy="520" rx="50" ry="54" fill="#0a0e14" fill-opacity="0.5"/>
  <path d="M232 392 C240 400 272 400 280 392" stroke="#0a0e14" stroke-width="2.5" stroke-opacity="0.4" fill="none"/>

