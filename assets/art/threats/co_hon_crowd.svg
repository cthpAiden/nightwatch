  <ellipse cx="132" cy="236" rx="8" ry="9" fill="url(#eyeCold)"/>
  <ellipse cx="152" cy="238" rx="8" ry="9" fill="url(#eyeCold)"/>
  <ellipse cx="394" cy="234" rx="8" ry="9" fill="url(#eyeCold)"/>
  <ellipse cx="414" cy="236" rx="8" ry="9" fill="url(#eyeCold)"/>
  <ellipse cx="248" cy="232" rx="8" ry="10" fill="url(#eyePale)"/>
  <ellipse cx="266" cy="232" rx="8" ry="10" fill="url(#eyePale)"/>

