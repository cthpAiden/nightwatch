<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- concrete base -->
  <rect x="0" y="0" width="512" height="512" fill="#1e2a3d"/>
  <rect x="0" y="0" width="512" height="512" fill="#222f42" fill-opacity="0.3"/>
  <!-- broad concrete pour tone patches -->
  <rect x="0" y="0" width="300" height="280" fill="#243149" fill-opacity="0.35"/>
  <rect x="280" y="240" width="232" height="272" fill="#18222f" fill-opacity="0.4"/>
  <rect x="60" y="320" width="220" height="180" fill="#1a2433" fill-opacity="0.35"/>
  <!-- concrete slab seams -->
  <g stroke="#0a0e14" stroke-width="3" stroke-opacity="0.5">
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
  </g>
  <!-- water stains / damp blooms -->
  <radialGradient id="cstain" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#141d28" stop-opacity="0.55"/>
    <stop offset="0.7" stop-color="#172029" stop-opacity="0.25"/>
    <stop offset="1" stop-color="#1e2a3d" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="110" cy="110" rx="100" ry="90" fill="url(#cstain)"/>
  <ellipse cx="430" cy="430" rx="110" ry="100" fill="url(#cstain)"/>
  <!-- cracks spidering -->
  <polyline points="0,200 90,210 140,180 190,230 230,210" fill="none" stroke="#10171f" stroke-width="2" stroke-opacity="0.6"/>
  <polyline points="512,300 430,290 390,330 350,300" fill="none" stroke="#10171f" stroke-width="2" stroke-opacity="0.55"/>
  <polyline points="300,512 310,450 290,420" fill="none" stroke="#10171f" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- dark vent rectangle, right-of-center -->
  <rect x="300" y="60" width="150" height="100" fill="#070a0f"/>
  <rect x="300" y="60" width="150" height="100" fill="none" stroke="#2c3a4f" stroke-width="4"/>
  <!-- vent louver slats -->
  <g stroke="#1a2330" stroke-width="6" stroke-opacity="0.9">
    <line x1="306" y1="78" x2="444" y2="78"/>
    <line x1="306" y1="96" x2="444" y2="96"/>
    <line x1="306" y1="114" x2="444" y2="114"/>
    <line x1="306" y1="132" x2="444" y2="132"/>
    <line x1="306" y1="150" x2="444" y2="150"/>
  </g>
  <!-- vent corner screws -->
  <circle cx="312" cy="72" r="4" fill="#2c3a4f"/>
  <circle cx="438" cy="72" r="4" fill="#2c3a4f"/>
  <circle cx="312" cy="148" r="4" fill="#2c3a4f"/>
  <circle cx="438" cy="148" r="4" fill="#2c3a4f"/>
  <!-- grime speckle -->
  <g fill="#10171f" fill-opacity="0.5">
    <circle cx="80" cy="300" r="3"/><circle cx="160" cy="400" r="2.5"/><circle cx="220" cy="350" r="2"/>
    <circle cx="60" cy="440" r="2.5"/><circle cx="200" cy="470" r="3"/><circle cx="120" cy="250" r="2"/>
    <circle cx="470" cy="240" r="2.5"/><circle cx="380" cy="420" r="3"/><circle cx="440" cy="370" r="2"/>
  </g>
  <!-- vignette -->
  <radialGradient id="ceilvig" cx="0.5" cy="0.5" r="0.75">
    <stop offset="0.55" stop-color="#0a0e14" stop-opacity="0"/>
    <stop offset="1" stop-color="#0a0e14" stop-opacity="0.5"/>
  </radialGradient>
  <rect x="0" y="0" width="512" height="512" fill="url(#ceilvig)"/>
</svg>
