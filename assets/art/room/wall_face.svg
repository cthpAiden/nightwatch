<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- A vague, smoky face that only half-resolves: hollow eyes + a suggestion of a
       jaw, kept low-contrast so it reads as "did I just see something?" rather than
       a clear monster. Drawn pale; the scene modulates its alpha for the flicker. -->
  <defs>
    <radialGradient id="haze" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#cdd8e0" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#9fb0bd" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#9fb0bd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="socket" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#05080c" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#05080c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- smoky head mass -->
  <ellipse cx="256" cy="220" rx="150" ry="190" fill="url(#haze)"/>
  <!-- hollow eyes -->
  <ellipse cx="205" cy="200" rx="40" ry="52" fill="url(#socket)"/>
  <ellipse cx="307" cy="200" rx="40" ry="52" fill="url(#socket)"/>
  <!-- faint dim pupils -->
  <circle cx="205" cy="206" r="9" fill="#aebfca" fill-opacity="0.5"/>
  <circle cx="307" cy="206" r="9" fill="#aebfca" fill-opacity="0.5"/>
  <!-- shadowed cheeks / gaunt hollows -->
  <ellipse cx="256" cy="300" rx="70" ry="44" fill="url(#socket)" opacity="0.6"/>
  <!-- thin mouth slit -->
  <path d="M214,318 q42,26 84,0" fill="none" stroke="#05080c" stroke-width="7" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- wispy dissolving tendrils at the bottom -->
  <g fill="none" stroke="#aebfca" stroke-opacity="0.18" stroke-width="6" stroke-linecap="round">
    <path d="M180,360 q-10,40 6,80"/>
    <path d="M256,380 q4,46 -4,86"/>
    <path d="M332,360 q12,40 -4,80"/>
  </g>
</svg>
