<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 408">
  <!-- ===== wooden frame ===== -->
  <rect x="0" y="0" width="768" height="408" fill="#4a3320"/>
  <rect x="0" y="0" width="768" height="408" fill="#5a3f25" fill-opacity="0.5"/>
  <!-- frame bevels -->
  <rect x="0" y="0" width="768" height="10" fill="#6b4d2e"/>
  <rect x="0" y="398" width="768" height="10" fill="#2c1f12"/>
  <rect x="0" y="0" width="10" height="408" fill="#6b4d2e"/>
  <rect x="758" y="0" width="10" height="408" fill="#2c1f12"/>
  <!-- wood grain hints -->
  <g fill="none" stroke="#33240f" stroke-width="1.5" stroke-opacity="0.45">
    <path d="M6,22 C260,18 520,26 762,20"/>
    <path d="M6,388 C260,384 520,392 762,386"/>
  </g>

  <!-- ===== slate ===== -->
  <rect x="30" y="30" width="708" height="318" fill="#13332a"/>
  <!-- inner shadow lip so the slate reads as recessed -->
  <rect x="30" y="30" width="708" height="318" fill="none" stroke="#0a1f18" stroke-width="6"/>
  <rect x="30" y="30" width="708" height="10" fill="#0c241c" fill-opacity="0.7"/>
  <!-- broad tone variance + cleaned arcs -->
  <rect x="30" y="30" width="360" height="318" fill="#163a2f" fill-opacity="0.45"/>
  <rect x="400" y="120" width="338" height="228" fill="#102b22" fill-opacity="0.5"/>

  <!-- eraser wipe arcs (dusty residue) -->
  <g fill="none" stroke="#9fb0a6" stroke-opacity="0.10">
    <path d="M70,120 C260,84 500,150 700,104" stroke-width="46"/>
    <path d="M70,250 C280,214 520,276 700,238" stroke-width="52"/>
  </g>

  <!-- ===== chalk writing (pale, hand-scrawled, legible-ish) ===== -->
  <g stroke="#eaf1ec" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.62">
    <!-- heading: "TRỰC ĐÊM" stylised as chalk strokes -->
    <path d="M70,78 h46 M93,78 v46"/>                 <!-- T -->
    <path d="M132,78 v46 M132,78 h26 q14,0 14,13 q0,13 -14,13 h-26 M150,104 l16,20"/> <!-- R -->
    <path d="M188,82 q-16,0 -16,20 q0,20 16,20 q14,0 16,-12"/>  <!-- C-ish -->
    <!-- gap -->
    <path d="M250,78 h44 M250,78 v46 h44 M250,101 h32"/>  <!-- E -->
    <path d="M312,124 v-46 h22 q20,0 20,23 q0,23 -20,23 z"/> <!-- D -->
    <path d="M372,124 v-46 l24,46 l24,-46 v46"/>  <!-- M -->
    <!-- underline -->
    <path d="M68,138 h360" stroke-width="2.4" stroke-opacity="0.5"/>
  </g>

  <!-- lesson lines (illegible cursive loops) -->
  <g stroke="#dbe4dd" stroke-width="2" fill="none" stroke-linecap="round" stroke-opacity="0.4">
    <path d="M72,176 q14,-16 28,0 q14,16 28,0 q14,-16 28,0 q14,16 28,0 q14,-16 28,0"/>
    <path d="M72,210 q12,-14 24,0 q12,14 24,0 q12,-14 24,0 q12,14 24,0 q12,-14 24,0 q12,14 24,0"/>
    <path d="M72,244 q16,-14 32,0 q16,14 32,0 q16,-14 32,0 q16,14 32,0"/>
    <path d="M72,288 q14,-16 28,0 q14,16 28,0 q14,-16 28,0"/>
  </g>

  <!-- a little diagram on the right (clock + arrow: the night shift) -->
  <g stroke="#cdd6d0" stroke-width="2.4" fill="none" stroke-opacity="0.45">
    <circle cx="600" cy="150" r="42"/>
    <path d="M600,150 v-26 M600,150 l20,12"/>
    <path d="M560,210 q40,30 80,0" />
    <path d="M636,206 l8,4 l-2,-9"/>  <!-- arrowhead -->
  </g>
  <!-- date, top-right -->
  <g stroke="#e3ebe5" stroke-width="2" fill="none" stroke-opacity="0.45" stroke-linecap="round">
    <path d="M556,70 h12 v22 M566,70 v22"/>
    <path d="M584,70 q-8,0 -8,11 q0,11 8,11 q8,0 8,-11 q0,-11 -8,-11"/>
    <path d="M610,70 v22 h12"/>
    <path d="M636,70 q-8,0 -8,11 q0,11 8,11 q8,0 8,-11 q0,-11 -8,-11"/>
  </g>

  <!-- chalk dust speckle -->
  <g fill="#eaf1ec" fill-opacity="0.22">
    <circle cx="160" cy="100" r="1.6"/><circle cx="360" cy="150" r="1.4"/><circle cx="520" cy="120" r="1.6"/>
    <circle cx="240" cy="260" r="1.4"/><circle cx="430" cy="300" r="1.6"/><circle cx="120" cy="320" r="1.4"/>
    <circle cx="660" cy="270" r="1.6"/><circle cx="300" cy="330" r="1.4"/><circle cx="700" cy="320" r="1.5"/>
  </g>

  <!-- ===== chalk tray ===== -->
  <rect x="24" y="348" width="720" height="22" fill="#2c1f12"/>
  <rect x="24" y="348" width="720" height="5" fill="#16100a"/>
  <rect x="24" y="365" width="720" height="5" fill="#5a3f25" fill-opacity="0.6"/>
  <!-- chalk sticks + eraser sitting in the tray -->
  <rect x="150" y="356" width="58" height="8" rx="4" fill="#eef3ee" fill-opacity="0.85"/>
  <rect x="230" y="357" width="44" height="7" rx="3" fill="#d9e2db" fill-opacity="0.7"/>
  <rect x="560" y="353" width="64" height="13" rx="2" fill="#3a2c1a"/>
  <rect x="560" y="353" width="64" height="6" rx="2" fill="#6b5436"/>

  <!-- frame corner pegs -->
  <circle cx="16" cy="16" r="5" fill="#16100a"/>
  <circle cx="752" cy="16" r="5" fill="#16100a"/>
  <circle cx="16" cy="392" r="5" fill="#16100a"/>
  <circle cx="752" cy="392" r="5" fill="#16100a"/>

  <!-- soft vignette so it sits in the dark room -->
  <radialGradient id="cbvig" cx="0.5" cy="0.5" r="0.82">
    <stop offset="0.55" stop-color="#070b10" stop-opacity="0"/>
    <stop offset="1" stop-color="#070b10" stop-opacity="0.45"/>
  </radialGradient>
  <rect x="0" y="0" width="768" height="408" fill="url(#cbvig)"/>
</svg>
