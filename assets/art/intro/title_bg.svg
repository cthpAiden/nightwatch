<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="0.55" stop-color="#121a2b"/>
      <stop offset="1" stop-color="#1e2a3d"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8ead0" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#e8ead0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#e8ead0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="windowGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0b65a" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#e8a33d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e8a33d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3a36" stop-opacity="0"/>
      <stop offset="1" stop-color="#36473f" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#sky)"/>

  <!-- moon glow + moon, set right of center so upper-center stays clear for logo -->
  <circle cx="930" cy="200" r="260" fill="url(#moonGlow)"/>
  <circle cx="930" cy="200" r="115" fill="#e8ead0"/>
  <circle cx="895" cy="175" r="22" fill="#dfe6e1" fill-opacity="0.5"/>
  <circle cx="965" cy="225" r="16" fill="#cdd6d0" fill-opacity="0.5"/>
  <circle cx="945" cy="160" r="11" fill="#cdd6d0" fill-opacity="0.4"/>

  <!-- stars -->
  <circle cx="180" cy="90" r="2" fill="#e8ead0" fill-opacity="0.8"/>
  <circle cx="320" cy="150" r="1.6" fill="#e8ead0" fill-opacity="0.6"/>
  <circle cx="120" cy="220" r="1.6" fill="#cdd6d0" fill-opacity="0.6"/>
  <circle cx="470" cy="80" r="2" fill="#e8ead0" fill-opacity="0.7"/>
  <circle cx="1150" cy="120" r="1.8" fill="#e8ead0" fill-opacity="0.7"/>
  <circle cx="1210" cy="260" r="1.6" fill="#cdd6d0" fill-opacity="0.6"/>
  <circle cx="600" cy="120" r="1.4" fill="#cdd6d0" fill-opacity="0.5"/>
  <circle cx="1080" cy="60" r="1.6" fill="#e8ead0" fill-opacity="0.6"/>

  <!-- bats -->
  <path d="M250 170 q12 -14 24 0 q12 -14 24 0 q-12 8 -24 4 q-12 4 -24 -4 z" fill="#0a0e14"/>
  <path d="M340 140 q9 -11 18 0 q9 -11 18 0 q-9 6 -18 3 q-9 3 -18 -3 z" fill="#0a0e14"/>
  <path d="M560 200 q7 -9 14 0 q7 -9 14 0 q-7 5 -14 2 q-7 3 -14 -2 z" fill="#0a0e14"/>
  <path d="M1120 320 q9 -11 18 0 q9 -11 18 0 q-9 6 -18 3 q-9 3 -18 -3 z" fill="#0a0e14"/>

  <!-- distant treeline -->
  <path d="M0 540 L40 510 L80 530 L120 500 L160 525 L210 495 L260 520 L300 505 L300 560 L0 560 Z" fill="#121a2b"/>
  <path d="M980 545 L1020 515 L1070 535 L1120 505 L1170 530 L1220 500 L1280 525 L1280 565 L980 565 Z" fill="#121a2b"/>

  <!-- school building silhouette (lone old Vietnamese school), centered-low -->
  <g>
    <!-- main two-story block -->
    <rect x="395" y="395" width="490" height="225" fill="#0a0e14"/>
    <!-- raised central pediment -->
    <polygon points="565,395 640,345 715,395" fill="#0a0e14"/>
    <rect x="600" y="368" width="80" height="30" fill="#0a0e14"/>
    <!-- low side wings -->
    <rect x="300" y="455" width="110" height="165" fill="#0a0e14"/>
    <rect x="870" y="455" width="110" height="165" fill="#0a0e14"/>
    <!-- roof eave line -->
    <rect x="290" y="448" width="130" height="12" fill="#121a2b"/>
    <rect x="385" y="388" width="510" height="12" fill="#121a2b"/>
    <rect x="860" y="448" width="130" height="12" fill="#121a2b"/>

    <!-- one warm-lit window glow -->
    <circle cx="470" cy="470" r="70" fill="url(#windowGlow)"/>
    <rect x="450" y="450" width="40" height="48" fill="#f0b65a"/>
    <line x1="470" y1="450" x2="470" y2="498" stroke="#0a0e14" stroke-width="3"/>
    <line x1="450" y1="474" x2="490" y2="474" stroke="#0a0e14" stroke-width="3"/>

    <!-- dark windows row -->
    <rect x="540" y="455" width="30" height="42" fill="#1e2a3d"/>
    <rect x="600" y="455" width="30" height="42" fill="#1e2a3d"/>
    <rect x="650" y="455" width="30" height="42" fill="#1e2a3d"/>
    <rect x="710" y="455" width="30" height="42" fill="#1e2a3d"/>
    <rect x="780" y="455" width="30" height="42" fill="#1e2a3d"/>
    <!-- ground-floor central doorway -->
    <rect x="615" y="540" width="50" height="80" fill="#121a2b"/>
    <rect x="623" y="552" width="34" height="68" fill="#1e2a3d"/>
    <!-- wing windows -->
    <rect x="330" y="500" width="26" height="36" fill="#1e2a3d"/>
    <rect x="900" y="500" width="26" height="36" fill="#1e2a3d"/>
  </g>

  <!-- low fence -->
  <rect x="0" y="612" width="1280" height="4" fill="#121a2b"/>
  <line x1="150" y1="600" x2="150" y2="618" stroke="#121a2b" stroke-width="4"/>
  <line x1="210" y1="600" x2="210" y2="618" stroke="#121a2b" stroke-width="4"/>
  <line x1="1080" y1="600" x2="1080" y2="618" stroke="#121a2b" stroke-width="4"/>
  <line x1="1140" y1="600" x2="1140" y2="618" stroke="#121a2b" stroke-width="4"/>

  <!-- mist at base -->
  <rect x="0" y="560" width="1280" height="160" fill="url(#mist)"/>
  <ellipse cx="350" cy="650" rx="320" ry="40" fill="#36473f" fill-opacity="0.35"/>
  <ellipse cx="900" cy="660" rx="360" ry="44" fill="#36473f" fill-opacity="0.35"/>
  <ellipse cx="640" cy="690" rx="500" ry="46" fill="#36473f" fill-opacity="0.45"/>
</svg>
